name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: cd server && npm ci
      - run: cd client && npm ci
      - run: cd server && npx prisma generate
      - name: Check server
        run: cd server && npx tsc --noEmit
      - name: Check client
        run: cd client && npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: cd server && npm ci
      - run: cd client && npm ci
      - run: cd server && npx prisma generate
      - name: Run server tests
        run: cd server && npx vitest run
      - name: Run client tests
        run: cd client && npx vitest run
        continue-on-error: true  # no client tests yet

  playwright-smoke:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: [typescript, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: cd server && npm ci
      - run: cd client && npm ci
      - name: Check if database secrets are configured
        id: check-db
        env:
          DB_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DB_URL" ]; then
            echo "has-db=true" >> $GITHUB_OUTPUT
            echo "Database secrets found, will run smoke tests"
          else
            echo "has-db=false" >> $GITHUB_OUTPUT
            echo "No database secrets configured, skipping smoke tests"
          fi
      - run: cd server && npx prisma generate
      - name: Push schema to test database
        if: steps.check-db.outputs.has-db == 'true'
        run: cd server && npx prisma db push --force-reset
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      - name: Install Playwright browsers
        if: steps.check-db.outputs.has-db == 'true'
        run: npx playwright install --with-deps chromium
      - name: Start backend server
        if: steps.check-db.outputs.has-db == 'true'
        run: |
          cd server && nohup npx tsx src/index.ts > /tmp/server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      - name: Wait for backend
        if: steps.check-db.outputs.has-db == 'true'
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/exercises && echo "Backend ready" && break
            sleep 1
          done
      - name: Start frontend dev server
        if: steps.check-db.outputs.has-db == 'true'
        run: |
          cd client && nohup npx vite --host --port 5173 > /tmp/client.log 2>&1 &
          echo "CLIENT_PID=$!" >> $GITHUB_ENV
      - name: Wait for frontend
        if: steps.check-db.outputs.has-db == 'true'
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173/ && echo "Frontend ready" && break
            sleep 1
          done
      - name: Run smoke tests
        if: steps.check-db.outputs.has-db == 'true'
        run: npm run test:e2e:smoke
        env:
          BASE_URL: http://localhost:5173
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'sk-test-placeholder' }}

  validator:
    name: Completion Validator
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: cd server && npm ci
      - run: cd client && npm ci
      - run: cd server && npx prisma generate
      - name: Run validator (JSON)
        run: bash scripts/validate-mission.sh --json 2>&1
        continue-on-error: true
